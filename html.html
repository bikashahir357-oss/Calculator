<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: background 0.3s ease;
        }

        body.dark {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .calculator {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 340px;
            margin: 20px;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        body.dark .calculator {
            background: rgba(30, 30, 45, 0.95);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.2rem;
            color: #333;
            font-weight: 600;
        }

        body.dark .header h1 {
            color: #fff;
        }

        .theme-toggle {
            background: none;
            border: 2px solid #ddd;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        body.dark .theme-toggle {
            border-color: #444;
        }

        .theme-toggle:hover {
            transform: rotate(180deg);
            border-color: #667eea;
        }

        .display {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            transition: background 0.3s ease;
        }

        body.dark .display {
            background: #0f0f1a;
        }

        .display .expression {
            font-size: 1rem;
            color: #888;
            min-height: 24px;
            word-break: break-all;
        }

        body.dark .display .expression {
            color: #666;
        }

        .display .result {
            font-size: 2.5rem;
            font-weight: 600;
            color: #333;
            word-break: break-all;
        }

        body.dark .display .result {
            color: #fff;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 16px;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #f0f0f0;
            color: #333;
        }

        body.dark button {
            background: #252535;
            color: #fff;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(0);
        }

        button.operator {
            background: #667eea;
            color: white;
        }

        button.operator:hover {
            background: #5a6fd6;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button.equals {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        button.equals:hover {
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        button.clear {
            background: #ff6b6b;
            color: white;
        }

        button.clear:hover {
            background: #ee5a5a;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        button.wide {
            grid-column: span 2;
        }

        @media (max-width: 400px) {
            .calculator {
                padding: 16px;
                border-radius: 20px;
            }

            button {
                padding: 16px;
                font-size: 1.1rem;
                border-radius: 12px;
            }

            .buttons {
                gap: 8px;
            }

            .display .result {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="header">
            <h1>Calculator</h1>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">🌓</button>
        </div>
        
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        
        <div class="buttons">
            <button class="clear" onclick="clearAll()">C</button>
            <button onclick="backspace()">⌫</button>
            <button onclick="appendValue('%')">%</button>
            <button class="operator" onclick="appendValue('/')">÷</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">×</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">−</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            
            <button class="wide" onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let expression = '';
        let justCalculated = false;

        function updateDisplay() {
            const expressionEl = document.getElementById('expression');
            const resultEl = document.getElementById('result');
            
            expressionEl.textContent = expression
                .replace(/\*/g, '×')
                .replace(/\//g, '÷')
                .replace(/-/g, '−');
            
            if (expression === '') {
                resultEl.textContent = '0';
            }
        }

        function appendValue(value) {
            const operators = ['+', '-', '*', '/', '%'];
            const lastChar = expression.slice(-1);

            // Start fresh after calculation if typing a number
            if (justCalculated && !operators.includes(value)) {
                expression = '';
                justCalculated = false;
            } else {
                justCalculated = false;
            }

            // Prevent multiple operators in a row
            if (operators.includes(value) && operators.includes(lastChar)) {
                expression = expression.slice(0, -1) + value;
                updateDisplay();
                return;
            }

            // Prevent operator at start (except minus for negative)
            if (expression === '' && operators.includes(value) && value !== '-') {
                return;
            }

            // Prevent multiple decimals in same number
            if (value === '.') {
                const parts = expression.split(/[\+\-\*\/\%]/);
                const currentNumber = parts[parts.length - 1];
                if (currentNumber.includes('.')) return;
                if (currentNumber === '') {
                    expression += '0';
                }
            }

            expression += value;
            updateDisplay();
        }

        function clearAll() {
            expression = '';
            justCalculated = false;
            updateDisplay();
            document.getElementById('result').textContent = '0';
        }

        function backspace() {
            expression = expression.slice(0, -1);
            justCalculated = false;
            updateDisplay();
        }

        function calculate() {
            if (expression === '') return;

            try {
                // Handle percentage
                let evalExpression = expression.replace(/%/g, '/100');
                
                // Validate expression
                if (/[+\-*\/]{2,}/.test(evalExpression)) {
                    throw new Error('Invalid expression');
                }

                // Remove trailing operator
                evalExpression = evalExpression.replace(/[+\-*\/]$/, '');

                if (evalExpression === '') return;

                let result = Function('"use strict"; return (' + evalExpression + ')')();

                // Handle division by zero
                if (!isFinite(result)) {
                    document.getElementById('result').textContent = 'Error';
                    expression = '';
                    return;
                }

                // Round to avoid floating point issues
                result = Math.round(result * 1e12) / 1e12;

                document.getElementById('result').textContent = result;
                expression = result.toString();
                justCalculated = true;
                updateDisplay();
            } catch (e) {
                document.getElementById('result').textContent = 'Error';
                expression = '';
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', document.body.classList.contains('dark'));
        }

        // Load saved theme
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            
            if (/[0-9]/.test(key)) {
                appendValue(key);
            } else if (key === '+' || key === '-') {
                appendValue(key);
            } else if (key === '*' || key === 'x' || key === 'X') {
                appendValue('*');
            } else if (key === '/') {
                e.preventDefault();
                appendValue('/');
            } else if (key === '%') {
                appendValue('%');
            } else if (key === '.') {
                appendValue('.');
            } else if (key === 'Enter' || key === '=') {
                e.preventDefault();
                calculate();
            } else if (key === 'Backspace') {
                backspace();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearAll();
            }
        });

        updateDisplay();
    </script>
</body>
</html>
